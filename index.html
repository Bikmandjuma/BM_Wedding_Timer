<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BM Countdown | Save The Date</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
/*      background-image: url('https://i.pinimg.com/736x/cc/97/29/cc97291fc56499a9620a763aabc5deb4.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;*/
/*      background-color: white;*/
      background-color: #f8f5f1;
      overflow-x: hidden;
      position: relative;
      font-family: sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 0;
/*      overflow-x: hidden;*/
    }

    /* Background overlay for readability */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .envelope {
      background-color: #741e3a;
    }

    #countdown{
      font-weight: bold;
      font-size: 18px;
    }

    .flower {
      position: fixed;
      top: -50px;
      width: 32px;
      height: 32px;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 1;
    }

    @keyframes fall {
      0% {
        transform: translateY(-50px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .heartbeat {
      animation: heartbeat 1.5s infinite;
      transform-origin: center;
    }

    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
      }
      25% {
        transform: scale(1.1);
      }
      50% {
        transform: scale(1.2);
      }
      75% {
        transform: scale(1.1);
      }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spin-slow-reverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    .animate-spin-slow {
      animation: spin-slow 10s linear infinite;
    }

    .animate-spin-slow-reverse {
      animation: spin-slow-reverse 10s linear infinite;
    }

  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative z-10">

  <script>
    const items = [
      "https://cdn-icons-png.flaticon.com/512/415/415733.png",
      "images/ring_one.png",
      "images/ring_two.png",
      "images/ring_three.png",
      "images/ring_four.png",
    ];

    for (let i = 0; i < 25; i++) {
      const el = document.createElement("img");
      el.src = items[Math.floor(Math.random() * items.length)];
      el.className = "flower";
      el.style.left = Math.random() * 100 + "vw";
      el.style.animationDuration = 5 + Math.random() * 5 + "s";
      document.body.appendChild(el);
    }
  </script>

  <div class="bg-white bg-opacity-90 rounded-lg shadow-2xl w-full max-w-md text-center p-6 space-y-4 z-10 relative backdrop-blur-md">
    
    <p class="text-sm text-gray-600">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</p>
    
    <p class="text-white font-semibold text-lg envelope py-2 rounded">
      B & M <br><span class="text-base">Are getting married</span>
    </p>
    
    <div class="relative border-2 border-[#741e3a] p-6 rounded-lg bg-white bg-opacity-80 flex items-center justify-center">
  
      <!-- Left Ring -->
      <img src="images/ring_one.png" alt="Ring One" class="w-20 h-20 absolute left-4 animate-spin-slow-reverse" />
      
      <!-- Center Text -->
      <div class="text-center">
        <p class="font-serif text-xl font-bold">SAVE</p>
        <p class="font-serif text-lg">THE</p>
        <p class="font-serif text-xl font-bold">DATE</p>
      </div>

      <!-- Right Ring -->
      <img src="images/ring_two.png" alt="Ring Two" class="w-20 h-20 absolute right-4 animate-spin-slow" />

    </div>

    
    <div class="text-lg font-semibold text-gray-700">Bikman & Mariam</div>

    <div class="text-xl font-bold text-[#741e3a]">03 | 08 | 2025</div>
    
    <div class="circle-wrapper">
      <div class="circle-border"></div>
      <div id="countdown" class="text-sm text-gray-600 font-mono heartbeat relative z-10"></div>
    </div>

    <div class="text-md italic text-gray-700">In shaa Allah</div>
  </div>

  <!-- Countdown Script -->
  <script>
    const countdownEl = document.getElementById("countdown");

    function updateCountdown() {
      const eventDate = new Date("2025-08-03T12:00:00+02:00");
      const now = new Date();
      const diff = eventDate - now;

      if (diff <= 0) {
        countdownEl.textContent = "It's time!";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      countdownEl.textContent = `${days}d : ${hours}h : ${minutes}m : ${seconds}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
